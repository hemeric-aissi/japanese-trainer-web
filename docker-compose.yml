services:

  # ── Reverse proxy : seul point d'entrée exposé ──────────────────
  nginx:
    build: ./services/nginx
    container_name: jt_nginx
    ports:
      - "8080:80"
    volumes:
      - ./services/php/src:/var/www/html:ro
      - ./services/frontend:/var/www/frontend:ro
    depends_on:
      - php
    networks:
      - frontend_net
    restart: unless-stopped

  # ── PHP-FPM : logique applicative, sans accès internet direct ───
  php:
    build: ./services/php
    container_name: jt_php
    env_file:
      - .env
    volumes:
      - ./services/php/src:/var/www/html:ro
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped
    # Pas de ports exposés : php-fpm n'est accessible que par nginx
    security_opt:
      - no-new-privileges:true

  # ── MariaDB : réseau interne uniquement, jamais exposé ──────────
  mariadb:
    image: mariadb:11
    container_name: jt_mariadb
    env_file:
      - .env
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./services/mariadb/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - backend_net
    # Port 3306 non exposé à l'hôte intentionnellement
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

networks:
  # Réseau nginx <-> php uniquement
  frontend_net:
    driver: bridge
  # Réseau php <-> mariadb uniquement
  backend_net:
    driver: bridge
    internal: true   # pas d'accès internet depuis ce réseau

volumes:
  mariadb_data:
    driver: local
